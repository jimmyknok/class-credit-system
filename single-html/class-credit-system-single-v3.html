      return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;

      trendingDown: `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"/><polyline points="16 17 22 17 22 11"/></svg>`,
      database: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5V19A9 3 0 0 0 21 19V5"/><path d="M3 12A9 3 0 0 0 21 12"/></svg>`,
      settings: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>`,
      barChart3: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="20" x2="12" y2="10"/><line x1="18" y1="20" x2="18" y2="4"/><line x1="6" y1="20" x2="6" y2="16"/></svg>`,
      zap: `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>`,
      fileText: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><line x1="10" y1="9" x2="18" y2="9"/><line x1="10" y1="13" x2="18" y2="13"/><line x1="10" y1="17" x2="18" y2="17"/></svg>`,
      menu: `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/></svg>`,
    };

    // ──────────────────────────────────────────────────────────────
    // 3. LocalStorage 数据层
    // ──────────────────────────────────────────────────────────────
    const emptyState = () => ({
      students: [],
      groups: [],
      rules: [],
      records: [],
      shopItems: [],
      meta: { schemaVersion: 3, updatedAt: new Date().toISOString() },
    });

    function safeParseJSON(raw) {
      try { return JSON.parse(raw); } catch { return null; }
    }

    const DB = {
      STORAGE_KEY: 'class_credit_system_data_v3',
      LEGACY_KEYS: ['class_credit_system_data'],

      bootstrapStorage() {
        const current = localStorage.getItem(this.STORAGE_KEY);
        if (current) {
          const parsed = safeParseJSON(current);
          if (!parsed) {
            const fresh = emptyState();
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(fresh));
            return fresh;
          }
          if (!parsed.meta) {
            parsed.meta = { schemaVersion: 3, updatedAt: new Date().toISOString() };
            localStorage.setItem(this.STORAGE_KEY, JSON.stringify(parsed));
          }
          return parsed;
        }

        for (const key of this.LEGACY_KEYS) {
          const legacyRaw = localStorage.getItem(key);
          if (!legacyRaw) continue;
          const legacy = safeParseJSON(legacyRaw);
          if (!legacy) break;
          const migrated = {
            students: legacy.students || [],
            groups: legacy.groups || [],
            rules: legacy.rules || [],
            records: legacy.records || [],
            shopItems: legacy.shopItems || [],
            meta: { schemaVersion: 3, updatedAt: new Date().toISOString() },
          };
          localStorage.setItem(this.STORAGE_KEY, JSON.stringify(migrated));
          return migrated;
        }

        const fresh = emptyState();
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(fresh));
        return fresh;
      },

      getAll() {
        this.bootstrapStorage();
        const raw = localStorage.getItem(this.STORAGE_KEY);
        if (!raw) return emptyState();
        const data = safeParseJSON(raw);
        if (!data) return emptyState();
        return {
          students: data.students || [],
          groups: data.groups || [],
          rules: data.rules || [],
          records: data.records || [],
          shopItems: data.shopItems || [],
          meta: data.meta || { schemaVersion: 3, updatedAt: new Date().toISOString() },
        };
      },

      saveAll(data) {
        const withMeta = { ...data, meta: { schemaVersion: 3, updatedAt: new Date().toISOString() } };
        localStorage.setItem(this.STORAGE_KEY, JSON.stringify(withMeta));
        this._notifyChange();
      },

      _listeners: [],
      onChange(cb) { this._listeners.push(cb); },
      _notifyChange() { this._listeners.forEach(cb => cb(this.getAll())); },

      addStudent(name, groupId = null) {
        const data = this.getAll();
        const student = { id: uid(), name, groupId, totalPoints: 0, availablePoints: 0, createdAt: new Date().toISOString() };
        data.students.push(student);
        this.saveAll(data);
        return student;
      },

      updateStudent(id, name, groupId) {
        const data = this.getAll();
        const s = data.students.find(st => st.id === id);
        if (s) { s.name = name; s.groupId = groupId; this.saveAll(data); }
      },

      deleteStudent(id) {
        const data = this.getAll();
        data.students = data.students.filter(s => s.id !== id);
        data.records = data.records.filter(r => r.studentId !== id);
        this.saveAll(data);
      },

      deleteStudents(ids) {
        const idSet = new Set(ids);
        const data = this.getAll();
        data.students = data.students.filter(s => !idSet.has(s.id));
        data.records = data.records.filter(r => !idSet.has(r.studentId));
        this.saveAll(data);
      },

      assignGroup(studentIds, groupId) {
        const data = this.getAll();
        const idSet = new Set(studentIds);
        data.students.forEach(s => { if (idSet.has(s.id)) s.groupId = groupId; });
        this.saveAll(data);
      },

      importStudents(rows, groupId = null) {
        const data = this.getAll();
        const newStudents = rows.map(row => ({
          id: uid(), name: row.name.trim(), gender: row.gender, studentId: row.studentId,
          groupId, totalPoints: 0, availablePoints: 0, createdAt: new Date().toISOString(),
        }));
        data.students.push(...newStudents);
        this.saveAll(data);
        return newStudents.length;
      },

      addGroup(name, color) {
        const data = this.getAll();
        const group = { id: uid(), name, color };
        data.groups.push(group);
        this.saveAll(data);
        return group;
      },

      updateGroup(id, name, color) {
        const data = this.getAll();
        const g = data.groups.find(gr => gr.id === id);
        if (g) { g.name = name; g.color = color; this.saveAll(data); }
      },

      deleteGroup(id) {
        const data = this.getAll();
        data.groups = data.groups.filter(g => g.id !== id);
        data.students.forEach(s => { if (s.groupId === id) s.groupId = null; });
        this.saveAll(data);
      },

      addRule(name, points, icon) {
        const data = this.getAll();
        const rule = { id: uid(), name, points, icon };
        data.rules.push(rule);
        this.saveAll(data);
        return rule;
      },

      updateRule(id, name, points, icon) {
        const data = this.getAll();
        const r = data.rules.find(ru => ru.id === id);
        if (r) { r.name = name; r.points = points; r.icon = icon; this.saveAll(data); }
      },

      deleteRule(id) {
        const data = this.getAll();
        data.rules = data.rules.filter(r => r.id !== id);
        this.saveAll(data);
      },

      applyPoints(studentIds, points, reason, ruleId = null) {
        const data = this.getAll();
        const now = new Date().toISOString();
        const isEarn = points > 0;
        const type = isEarn ? 'earn' : 'deduct';
        const absPoints = Math.abs(points);

        const newRecords = studentIds.map(sid => ({
          id: uid(), studentId: sid, type, points: absPoints, reason, ruleId, createdAt: now,
        }));

        data.students.forEach(s => {
          if (studentIds.includes(s.id)) {
            if (isEarn) {
              s.totalPoints += absPoints;
              s.availablePoints += absPoints;
            } else {
              s.availablePoints = Math.max(0, s.availablePoints - absPoints);
            }
          }
        });

        data.records.unshift(...newRecords);
        this.saveAll(data);
        return newRecords;
      },

      redeemItem(studentId, shopItemId) {
        const data = this.getAll();
        const student = data.students.find(s => s.id === studentId);
        const item = data.shopItems.find(i => i.id === shopItemId);

        if (!student || !item) return { success: false, message: '学生或商品不存在' };
        if (student.availablePoints < item.requiredPoints) return { success: false, message: '可用积分不足' };
        if (item.stock !== -1 && item.stock <= item.sold) return { success: false, message: '商品库存不足' };

        student.availablePoints -= item.requiredPoints;
        item.sold++;

        const record = { id: uid(), studentId, type: 'redeem', points: item.requiredPoints, reason: `兑换：${item.name}`, shopItemId, createdAt: new Date().toISOString() };
        data.records.unshift(record);
        this.saveAll(data);
        return { success: true, message: `成功兑换「${item.name}」` };
      },

      resetPoints() {
        const data = this.getAll();
        data.students.forEach(s => { s.totalPoints = 0; s.availablePoints = 0; });
        data.records = [];
        this.saveAll(data);
      },

      addShopItem(name, requiredPoints, stock, description) {
        const data = this.getAll();
        const item = { id: uid(), name, requiredPoints, stock, description, sold: 0 };
        data.shopItems.push(item);
        this.saveAll(data);
        return item;
      },

      updateShopItem(id, name, requiredPoints, stock, description) {
        const data = this.getAll();
        const item = data.shopItems.find(i => i.id === id);
        if (item) { item.name = name; item.requiredPoints = requiredPoints; item.stock = stock; item.description = description; this.saveAll(data); }
      },

      deleteShopItem(id) {
        const data = this.getAll();
        data.shopItems = data.shopItems.filter(i => i.id !== id);
        this.saveAll(data);
      },

      getStudentById(id) { return this.getAll().students.find(s => s.id === id); },
      getGroupById(id) { return this.getAll().groups.find(g => g.id === id); },
      getGroupTotalPoints(groupId) {
        return this.getAll().students.filter(s => s.groupId === groupId).reduce((sum, s) => sum + s.totalPoints, 0);
      },
    };

    // ──────────────────────────────────────────────────────────────
    // 4. 路由系统
    // ──────────────────────────────────────────────────────────────
    const Router = {
      routes: { '': 'Dashboard', 'students': 'Students', 'groups': 'Groups', 'points': 'Points', 'rules': 'Rules', 'records': 'Records', 'shop': 'Shop', 'tools': 'Tools', 'settings': 'Settings' },

      init() {
        window.addEventListener('hashchange', () => this.render());
        this.render();
      },

      getCurrentRoute() {
        const hash = window.location.hash.slice(1) || '';
        return this.routes[hash] || 'Dashboard';
      },

      navigate(path) { window.location.hash = path; },

      render() {
        const route = this.getCurrentRoute();
        const pageFn = Pages[route];
        if (pageFn) {
          const content = pageFn();
          $('#app').innerHTML = Layout(content);
          // 初始化页面事件
          if (Pages[route]._init) Pages[route]._init();
        }
      },
    };

    // ──────────────────────────────────────────────────────────────
    // 5. 全局状态
    // ──────────────────────────────────────────────────────────────
    const Store = {
      data: null,
      init() {
        this.data = DB.getAll();
        DB.onChange(() => { this.data = DB.getAll(); });
      },
      get() { return this.data || DB.getAll(); },
    };

    // ──────────────────────────────────────────────────────────────
    // 6. UI 组件
    // ──────────────────────────────────────────────────────────────
    const Components = {
      Modal: ({ title, content, onClose }) => `
        <div class="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4" onclick="if(event.target===this)(${onClose})">
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-md" onclick="event.stopPropagation()">
            <div class="flex items-center justify-between px-6 py-4 border-b border-gray-100">
              <h3 class="text-gray-900 font-medium">${title}</h3>
              <button onclick="${onClose}" class="text-gray-400 hover:text-gray-600">${Icons.x}</button>
            </div>
            <div class="p-6">${content}</div>
          </div>
        </div>
      `,

      toast(msg, type = 'success') {
        const colors = { success: 'bg-emerald-50 border-emerald-200 text-emerald-700', error: 'bg-red-50 border-red-200 text-red-700' };
        const icon = type === 'success' ? Icons.check : Icons.alertTriangle;
        let container = $('#toast-container');
        if (!container) {
          container = document.createElement('div');
          container.id = 'toast-container';
          container.className = 'fixed top-4 right-4 z-50 space-y-2';
          document.body.appendChild(container);
        }
        const toast = document.createElement('div');
        toast.className = `flex items-center gap-2 px-4 py-3 rounded-xl border text-sm ${colors[type]} shadow-lg`;
        toast.innerHTML = `<span class="flex-shrink-0">${icon}</span>${msg}`;
        container.appendChild(toast);
        setTimeout(() => { toast.style.opacity = '0'; setTimeout(() => toast.remove(), 300); }, 3000);
      },

      confirm({ title, message, onConfirm, onCancel }) {
        const modal = document.createElement('div');
        modal.className = 'fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4';
        modal.innerHTML = `
          <div class="bg-white rounded-2xl shadow-xl w-full max-w-sm p-6">
            <h3 class="text-gray-900 mb-2">${title}</h3>
            <p class="text-sm text-gray-600 mb-5">${message}</p>
            <div class="flex gap-2">
              <button class="cancel flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
              <button class="confirm flex-1 px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">确认</button>
            </div>
          </div>
        `;
        document.body.appendChild(modal);
        modal.querySelector('.cancel').onclick = () => { modal.remove(); onCancel?.(); };
        modal.querySelector('.confirm').onclick = () => { modal.remove(); onConfirm?.(); };
        modal.onclick = (e) => { if (e.target === modal) { modal.remove(); onCancel?.(); } };
      },
    };

    // ──────────────────────────────────────────────────────────────
    // 7. 页面组件
    // ──────────────────────────────────────────────────────────────
    const Pages = {};
    const DashboardState = { ruleTab: 'earn' };

    // ── Dashboard ─────────────────────────────────────────────────────
    Pages.Dashboard = () => {
      const { students, groups, records, shopItems } = Store.get();
      const totalStudents = students.length;
      const avgPoints = totalStudents > 0 ? Math.round(students.reduce((s, st) => s + st.totalPoints, 0) / totalStudents) : 0;
      const maxPoints = students.reduce((m, s) => Math.max(m, s.totalPoints), 0);
      const topStudent = students.find(s => s.totalPoints === maxPoints);
      const recentRecords = records.slice(0, 6);

      const topStudents = [...students].sort((a, b) => b.availablePoints - a.availablePoints).slice(0, 5).map(s => ({
        name: s.name, points: s.availablePoints, group: groups.find(g => g.id === s.groupId) || null,
      }));

      const groupStats = groups.map(g => {
        const members = students.filter(s => s.groupId === g.id);
        const total = members.reduce((s, m) => s + m.availablePoints, 0);
        return { name: g.name, points: total, color: g.color, count: members.length };
      }).sort((a, b) => b.points - a.points).slice(0, 5);

      const totalSold = shopItems.reduce((s, i) => s + i.sold, 0);
      const now = new Date();
      const thisMonthStart = new Date(now.getFullYear(), now.getMonth(), 1).toISOString();
      const nextMonthStart = new Date(now.getFullYear(), now.getMonth() + 1, 1).toISOString();
      const lastMonthStart = new Date(now.getFullYear(), now.getMonth() - 1, 1).toISOString();

      const earnByStudent = (from, to) => {
        const map = {};
        records.forEach(r => {
          if (r.type === 'earn' && r.createdAt >= from && r.createdAt < to) {
            map[r.studentId] = (map[r.studentId] || 0) + r.points;
          }
        });
        return map;
      };
      const thisEarn = earnByStudent(thisMonthStart, nextMonthStart);
      const lastEarn = earnByStudent(lastMonthStart, thisMonthStart);
      const growthTop = students.map(s => ({
        id: s.id,
        name: s.name,
        growth: (thisEarn[s.id] || 0) - (lastEarn[s.id] || 0),
        thisMonth: thisEarn[s.id] || 0,
        lastMonth: lastEarn[s.id] || 0,
      })).sort((a, b) => b.growth - a.growth).slice(0, 3);
      const maxGrowth = Math.max(...growthTop.map(x => Math.abs(x.growth)), 1);

      const ruleStatsMap = {};
      records.forEach(r => {
        if (!r.ruleId) return;
        if (r.type !== 'earn' && r.type !== 'deduct') return;
        if (!ruleStatsMap[r.ruleId]) ruleStatsMap[r.ruleId] = { id: r.ruleId, total: 0, type: r.type };
        ruleStatsMap[r.ruleId].total += r.points;
      });
      const ruleStats = Object.values(ruleStatsMap).map(rs => {
        const rule = Store.get().rules.find(x => x.id === rs.id);
        return { ...rs, name: rule?.name || '未知规则', icon: rule?.icon || '📌' };
      });
      const topEarnRules = ruleStats.filter(r => r.type === 'earn').sort((a, b) => b.total - a.total).slice(0, 3);
      const topDeductRules = ruleStats.filter(r => r.type === 'deduct').sort((a, b) => b.total - a.total).slice(0, 3);
      const maxEarn = Math.max(...topEarnRules.map(r => r.total), 1);
      const maxDeduct = Math.max(...topDeductRules.map(r => r.total), 1);

      const totalAvailableAllGroups = Math.max(1, students.filter(s => s.groupId).reduce((sum, s) => sum + s.availablePoints, 0));

      const ruleRows = (DashboardState.ruleTab === 'earn' ? topEarnRules : topDeductRules).map((r, i) => {
        const usage = records.filter(x => x.ruleId === r.id).length;
        const isEarn = DashboardState.ruleTab === 'earn';
        return `
          <tr class="border-b border-gray-50 last:border-0">
            <td class="px-2 py-2 text-xs text-gray-400">#${i + 1}</td>

            <td class="px-2 py-2 text-right text-sm font-semibold ${isEarn ? 'text-emerald-600' : 'text-red-600'}">${r.total}</td>
          </tr>

      return `

                </div>
              </div>
            `).join('')}
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-center justify-between mb-4">
                <div>
                  <h3 class="text-gray-900">个人积分榜</h3>
                  <p class="text-xs text-gray-400 mt-0.5">按可用积分降序 · Top5</p>
                </div>
                <button onclick="Router.navigate('students')" class="text-xs text-indigo-600 hover:text-indigo-700 flex items-center gap-1">全部 ${Icons.arrowRight}</button>
              </div>
              ${topStudents.length === 0 ? '<p class="text-sm text-gray-400 text-center py-6">暂无学生数据</p>' : `
                <div class="space-y-3">
                  ${topStudents.map((s, i) => `
                    <div onclick="Router.navigate('students')" class="group cursor-pointer rounded-lg px-2 py-1.5 hover:bg-indigo-50/60 transition-colors flex items-center gap-3">
                      <div class="w-8 text-center"><span class="text-sm font-semibold ${i === 0 ? 'text-amber-500' : i === 1 ? 'text-gray-400' : i === 2 ? 'text-orange-400' : 'text-gray-400'}">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</span></div>
                      <div class="flex-1">
                        <div class="flex justify-between items-center mb-1">

                        </div>

                <h3 class="text-gray-900">最新积分记录</h3>

              ${recentRecords.length === 0 ? '<p class="text-sm text-gray-400 text-center py-6">暂无积分记录</p>' : `

                  ${recentRecords.map(rec => {

                    const typeLabel = rec.type === 'earn' ? '加分' : rec.type === 'deduct' ? '扣分' : '兑换';
                    const typeSign = rec.type === 'earn' ? '+' : '-';
                    return `
                      <div class="flex items-center gap-3 py-3">
                        <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-sm font-medium text-indigo-700">${student?.name.slice(0, 1) || '?'}</div>
                        <div class="flex-1 min-w-0">
                          <p class="text-sm text-gray-800 truncate">${escapeHtml(student?.name || '未知学生')} · ${escapeHtml(rec.reason)}</p>

                        <div class="flex items-center gap-2">
                          <span class="text-xs px-2 py-0.5 rounded-full font-medium ${typeColor}">${typeLabel}</span>
                          <span class="text-sm font-semibold ${rec.type === 'earn' ? 'text-emerald-600' : 'text-red-600'}">${typeSign}${rec.points}</span>
                        </div>
                      </div>
                    `;
                  }).join('')}
                </div>
              `}

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-center justify-between mb-1">
                <div>
                  <h3 class="text-gray-900">积分增长榜</h3>
                  <p class="text-xs text-gray-400 mt-0.5">表扬进步最快同学 · 本月新增 - 上月新增 · Top3</p>
                </div>
                <button onclick="Router.navigate('records')" class="text-xs text-indigo-600 hover:text-indigo-700 flex items-center gap-1">查看全部 ${Icons.arrowRight}</button>
              </div>
              ${growthTop.length === 0 ? '<p class="text-sm text-gray-400 text-center py-6">暂无数据</p>' : `
                <div class="space-y-3">
                  ${growthTop.map((g, i) => `
                    <div onclick="Router.navigate('records')" class="group cursor-pointer rounded-lg px-2 py-1.5 hover:bg-indigo-50/60 transition-colors">
                      <div class="flex items-center gap-2 justify-between">
                        <div class="flex items-center gap-2 min-w-0">
                          <span class="text-sm font-semibold ${i === 0 ? 'text-amber-500' : i === 1 ? 'text-gray-400' : 'text-orange-400'}">${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'}</span>
                          <div class="w-7 h-7 rounded-full bg-gray-100 text-gray-500 flex items-center justify-center text-xs font-semibold">${escapeHtml(g.name.slice(0, 1))}</div>
                          <span class="text-sm text-gray-800 truncate">${escapeHtml(g.name)}</span>
                        </div>
                        <div class="flex items-center gap-2">
                          <span class="text-sm font-medium ${g.growth >= 0 ? 'text-emerald-600' : 'text-red-600'}">${g.growth >= 0 ? '+' : ''}${g.growth}</span>
                          <span class="text-xs text-gray-400">(${g.lastMonth}→${g.thisMonth})</span>
                        </div>
                      </div>
                      <div class="h-2 bg-gray-100 rounded-full overflow-hidden mt-1">
                        <div class="h-full rounded-full transition-all duration-300 ${g.growth >= 0 ? 'bg-indigo-500 group-hover:bg-indigo-600' : 'bg-red-500 group-hover:bg-red-600'}" style="min-width:4px;width:${Math.max(4, (Math.abs(g.growth) / maxGrowth) * 100)}%"></div>
                      </div>
                    </div>
                  `).join('')}
                </div>
              `}
            </div>

            <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
              <div class="flex items-center justify-between mb-3">
                <h3 class="text-gray-900">规则累计排行</h3>
                <div class="flex rounded-md border border-gray-200 overflow-hidden">
                  <button onclick="DashboardState.ruleTab='earn'; Router.render();" class="px-2 py-1 text-xs ${DashboardState.ruleTab === 'earn' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600'}">加分</button>
                  <button onclick="DashboardState.ruleTab='deduct'; Router.render();" class="px-2 py-1 text-xs ${DashboardState.ruleTab === 'deduct' ? 'bg-red-600 text-white' : 'bg-white text-gray-600'}">减分</button>
                </div>
              </div>
              <p class="text-xs text-gray-400 mb-2">${DashboardState.ruleTab === 'earn' ? '累计加分规则 TOP3（历史）' : '累计减分规则 TOP3（历史）'}</p>
              ${ruleRows ? `
                <div class="bg-gray-50/60 rounded-lg p-2">
                  <table class="w-full">
                    <thead>
                      <tr>
                        <th class="text-left px-2 py-1 text-[11px] text-gray-400 font-medium">名次</th>
                        <th class="text-left px-2 py-1 text-[11px] text-gray-400 font-medium">规则</th>
                        <th class="text-left px-2 py-1 text-[11px] text-gray-400 font-medium">次数</th>
                        <th class="text-right px-2 py-1 text-[11px] text-gray-400 font-medium">累计分</th>
                      </tr>

                    <tbody>${ruleRows}</tbody>
                  </table>
                </div>
              ` : `
                <p class="text-xs text-gray-400">暂无</p>
              `}
            </div>
          </div>

          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <button onclick="Router.navigate('points')" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm bg-indigo-600 hover:bg-indigo-700 text-white">${Icons.plus} 加减积分</button>
            <button onclick="Router.navigate('tools')" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm bg-purple-600 hover:bg-purple-700 text-white">${Icons.shuffle} 随机点名</button>
            <button onclick="Router.navigate('tools')" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm bg-amber-500 hover:bg-amber-600 text-white">${Icons.timer} 课堂计时</button>
            <button onclick="Router.navigate('shop')" class="flex items-center justify-center gap-2 px-4 py-3 rounded-xl text-sm bg-emerald-600 hover:bg-emerald-700 text-white">${Icons.trophy} 积分商店</button>
          </div>
        </div>
      `;
    };

    // ── Students ────────────────────────────────────────────────────────
    let StudentsState = {
      search: '',
      groupFilter: '',
      sortBy: 'totalPoints',
      sortDir: 'desc',
      page: 1,
      pageSize: 10,
      selected: new Set(),
      modal: null,
      editing: null,
      importMode: null,
      importTab: 'text',
      importRows: [],
      importFileName: '',
      importGroupId: '',
    };

    Pages.Students = () => {
      const { students, groups } = Store.get();
      const ungroupedCount = students.filter(s => !s.groupId).length;
      const groupCount = (gid) => students.filter(s => s.groupId === gid).length;
      const filtered = students.filter(s => {
        const matchSearch = !StudentsState.search || s.name.toLowerCase().includes(StudentsState.search.toLowerCase());
        const matchGroup = !StudentsState.groupFilter
          || (StudentsState.groupFilter === '__none__' ? !s.groupId : s.groupId === StudentsState.groupFilter);
        return matchSearch && matchGroup;
      });
      const sorted = [...filtered].sort((a, b) => {
        const dir = StudentsState.sortDir === 'asc' ? 1 : -1;
        if (StudentsState.sortBy === 'name') return a.name.localeCompare(b.name) * dir;
        if (StudentsState.sortBy === 'availablePoints') return (a.availablePoints - b.availablePoints) * dir;
        return (a.totalPoints - b.totalPoints) * dir;
      });
      const totalPages = Math.max(1, Math.ceil(sorted.length / StudentsState.pageSize));
      if (StudentsState.page > totalPages) StudentsState.page = totalPages;
      const pageStart = (StudentsState.page - 1) * StudentsState.pageSize;
      const paged = sorted.slice(pageStart, pageStart + StudentsState.pageSize);
      const sortMark = (col) => StudentsState.sortBy === col ? (StudentsState.sortDir === 'asc' ? '↑' : '↓') : '';

      return `
        <div class="p-6 max-w-6xl mx-auto space-y-4">
          <div class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div><h1 class="text-gray-900 text-xl">学生管理</h1><p class="text-sm text-gray-500 mt-0.5">共 ${students.length} 名学生 · ${StudentsState.selected.size} 已选择</p></div>
            <div class="flex gap-2">
              ${StudentsState.selected.size > 0 ? `
                <button onclick="Pages.Students._bulkDelete()" class="flex items-center gap-1.5 px-3 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">${Icons.trash2} 删除</button>
                <button onclick="Pages.Students._showBulkAssign()" class="flex items-center gap-1.5 px-3 py-2 bg-white text-gray-700 rounded-lg text-sm border hover:bg-gray-50">分配小组</button>
              ` : ''}
              <button onclick="Pages.Students._showImport()" class="flex items-center gap-1.5 px-3 py-2 bg-white text-gray-700 rounded-lg text-sm border hover:bg-gray-50">${Icons.upload} 导入</button>
              <button onclick="StudentsState.modal = 'add'; Router.render();" class="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">${Icons.plus} 添加学生</button>
            </div>
          </div>

          <div class="flex flex-col sm:flex-row gap-3">
            <div class="relative flex-1">
              <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">${Icons.search}</span>
              <input id="student-search" placeholder="搜索学生..." value="${escapeHtml(StudentsState.search)}" class="w-full pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <select id="student-group-filter" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white">
              <option value="">全部小组</option>
              ${groups.map(g => `<option value="${g.id}" ${StudentsState.groupFilter === g.id ? 'selected' : ''}>${escapeHtml(g.name)}（${groupCount(g.id)}人）</option>`).join('')}

          </div>

          <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            ${sorted.length === 0 ? '<p class="text-sm text-gray-400 text-center py-8">暂无学生</p>' : `
              <div class="overflow-x-auto">
                <table class="w-full">
                  <thead class="bg-gray-50 border-b border-gray-100">
                    <tr>
                      <th class="w-10 px-4 py-3"><input type="checkbox" id="select-all-students" class="rounded border-gray-300" ${paged.length > 0 && paged.every(s => StudentsState.selected.has(s.id)) ? 'checked' : ''} /></th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">
                        <button onclick="Pages.Students._toggleSort('name')" class="hover:text-gray-700">学生 ${sortMark('name')}</button>
                      </th>
                      <th class="px-4 py-3 text-left text-xs font-medium text-gray-500">小组</th>
                      <th class="px-4 py-3 text-right text-xs font-medium text-gray-500">
                        <button onclick="Pages.Students._toggleSort('totalPoints')" class="hover:text-gray-700">总积分 ${sortMark('totalPoints')}</button>
                      </th>
                      <th class="px-4 py-3 text-right text-xs font-medium text-gray-500">
                        <button onclick="Pages.Students._toggleSort('availablePoints')" class="hover:text-gray-700">可用 ${sortMark('availablePoints')}</button>
                      </th>
                      <th class="w-24 px-4 py-3 text-right text-xs font-medium text-gray-500">操作</th>
                    </tr>
                  </thead>
                  <tbody class="divide-y divide-gray-50">
                    ${paged.map(s => {
                      const group = groups.find(g => g.id === s.groupId);
                      return `
                        <tr class="hover:bg-gray-50">
                          <td class="px-4 py-3"><input type="checkbox" class="student-select rounded border-gray-300" data-id="${s.id}" ${StudentsState.selected.has(s.id) ? 'checked' : ''} /></td>
                          <td class="px-4 py-3">
                            <div class="flex items-center gap-3">
                              <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-sm font-medium text-indigo-700">${escapeHtml(s.name.slice(0, 1))}</div>
                              <span class="text-sm text-gray-800">${escapeHtml(s.name)}</span>
                            </div>
                          </td>
                          <td class="px-4 py-3">
                            ${group ? `<span class="text-xs px-2 py-1 rounded-full text-white font-medium" style="background-color: ${group.color}">${escapeHtml(group.name)}</span>` : '<span class="text-xs text-gray-400">未分组</span>'}
                          </td>
                          <td class="px-4 py-3 text-right"><span class="text-sm font-medium text-gray-900">${s.totalPoints}</span></td>
                          <td class="px-4 py-3 text-right"><span class="text-sm font-medium ${s.availablePoints > 0 ? 'text-emerald-600' : 'text-gray-500'}">${s.availablePoints}</span></td>
                          <td class="px-4 py-3 text-right">
                            <div class="flex justify-end gap-1">
                              <button onclick="StudentsState.editing = Store.get().students.find(x=>x.id==='${s.id}'); StudentsState.modal = 'edit'; Router.render();" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded">${Icons.edit2}</button>
                              <button onclick="Pages.Students._delete('${s.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded">${Icons.trash2}</button>
                            </div>
                          </td>
                        </tr>
                      `;
                    }).join('')}
                  </tbody>
                </table>
              </div>
              ${sorted.length > StudentsState.pageSize ? `
                <div class="flex items-center justify-between px-4 py-3 border-t border-gray-100 bg-gray-50">
                  <span class="text-xs text-gray-500">共 ${sorted.length} 条，第 ${pageStart + 1}-${Math.min(pageStart + StudentsState.pageSize, sorted.length)} 条</span>
                  <div class="flex items-center gap-2">
                    <button onclick="Pages.Students._setPage(${StudentsState.page - 1})" ${StudentsState.page === 1 ? 'disabled' : ''} class="px-2 py-1 border border-gray-200 rounded text-xs ${StudentsState.page === 1 ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'}">上一页</button>
                    <span class="text-xs text-gray-600">${StudentsState.page}/${totalPages}</span>
                    <button onclick="Pages.Students._setPage(${StudentsState.page + 1})" ${StudentsState.page === totalPages ? 'disabled' : ''} class="px-2 py-1 border border-gray-200 rounded text-xs ${StudentsState.page === totalPages ? 'opacity-40 cursor-not-allowed' : 'hover:bg-gray-100'}">下一页</button>
                  </div>
                </div>
              ` : ''}
            `}
          </div>

          ${StudentsState.modal === 'add' || StudentsState.modal === 'edit' ? Pages.Students._renderModal() : ''}
          ${StudentsState.modal === 'bulkAssign' ? Pages.Students._renderBulkAssignModal() : ''}
          ${StudentsState.importMode ? Pages.Students._renderImportModal() : ''}
        </div>
      `;
    };

    Pages.Students._init = () => {
      const searchInput = $('#student-search');
      const groupFilter = $('#student-group-filter');
      const selectAll = $('#select-all-students');

      searchInput?.addEventListener('input', (e) => { StudentsState.search = e.target.value; StudentsState.page = 1; Router.render(); });
      groupFilter?.addEventListener('change', (e) => { StudentsState.groupFilter = e.target.value; StudentsState.page = 1; Router.render(); });

      selectAll?.addEventListener('change', (e) => {
        const { students } = Store.get();
        const filtered = students.filter(s => {
          const matchSearch = !StudentsState.search || s.name.toLowerCase().includes(StudentsState.search.toLowerCase());
          const matchGroup = !StudentsState.groupFilter || (StudentsState.groupFilter === '__none__' ? !s.groupId : s.groupId === StudentsState.groupFilter);
          return matchSearch && matchGroup;
        });
        const sorted = [...filtered].sort((a, b) => {
          const dir = StudentsState.sortDir === 'asc' ? 1 : -1;
          if (StudentsState.sortBy === 'name') return a.name.localeCompare(b.name) * dir;
          if (StudentsState.sortBy === 'availablePoints') return (a.availablePoints - b.availablePoints) * dir;
          return (a.totalPoints - b.totalPoints) * dir;
        });
        const start = (StudentsState.page - 1) * StudentsState.pageSize;
        const paged = sorted.slice(start, start + StudentsState.pageSize);
        if (e.target.checked) paged.forEach(s => StudentsState.selected.add(s.id));
        else paged.forEach(s => StudentsState.selected.delete(s.id));
        Router.render();
      });

      document.querySelectorAll('.student-select').forEach(cb => {
        cb.addEventListener('change', (e) => {
          if (e.target.checked) StudentsState.selected.add(e.target.dataset.id);
          else StudentsState.selected.delete(e.target.dataset.id);
          Router.render();
        });
      });
    };

    Pages.Students._toggleSort = (col) => {
      if (StudentsState.sortBy === col) StudentsState.sortDir = StudentsState.sortDir === 'asc' ? 'desc' : 'asc';
      else { StudentsState.sortBy = col; StudentsState.sortDir = 'desc'; }
      StudentsState.page = 1;
      Router.render();
    };

    Pages.Students._setPage = (p) => {
      if (p < 1) return;
      StudentsState.page = p;
      Router.render();
    };

    Pages.Students._renderModal = () => {
      const { groups } = Store.get();
      const isEdit = StudentsState.modal === 'edit';
      const student = StudentsState.editing || { name: '', groupId: '' };

      return Components.Modal({
        title: isEdit ? '编辑学生' : '添加学生',
        onClose: 'StudentsState.modal=null; StudentsState.editing=null; Router.render();',
        content: `
          <div class="space-y-4">
            <div>
              <label class="block text-sm text-gray-700 mb-1.5">学生姓名 *</label>
              <input id="student-name-input" value="${escapeHtml(student.name)}" placeholder="输入学生姓名" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" />
            </div>
            <div>
              <label class="block text-sm text-gray-700 mb-1.5">所属小组</label>
              <select id="student-group-input" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="">未分组（${students.filter(s => !s.groupId).length}人）</option>
                ${groups.map(g => `<option value="${g.id}" ${student.groupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)}（${students.filter(s => s.groupId === g.id).length}人）</option>`).join('')}
              </select>
            </div>
            <div class="flex gap-2">
              <button onclick="StudentsState.modal=null; StudentsState.editing=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
              <button onclick="Pages.Students._saveStudent()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">保存</button>
            </div>
          </div>
        `
      });
    };

    Pages.Students._saveStudent = () => {
      const name = $('#student-name-input')?.value.trim();
      const groupId = $('#student-group-input')?.value || null;
      if (!name) return Components.toast('请输入学生姓名', 'error');

      if (StudentsState.modal === 'edit') {
        DB.updateStudent(StudentsState.editing.id, name, groupId);
        Components.toast('学生信息已更新');
      } else {
        DB.addStudent(name, groupId);
        Components.toast('学生已添加');
      }
      StudentsState.modal = null;
      StudentsState.editing = null;
      Router.render();
    };

    Pages.Students._delete = (id) => {
      Components.confirm({
        title: '删除学生',
        message: '确定删除该学生吗？相关的积分记录也将被删除。',
        onConfirm: () => { DB.deleteStudent(id); StudentsState.selected.delete(id); Components.toast('学生已删除'); Router.render(); }
      });
    };

    Pages.Students._bulkDelete = () => {
      Components.confirm({
        title: '批量删除',
        message: `确定删除选中的 ${StudentsState.selected.size} 名学生吗？`,
        onConfirm: () => { DB.deleteStudents([...StudentsState.selected]); StudentsState.selected.clear(); Components.toast('学生已删除'); Router.render(); }
      });
    };

    Pages.Students._showBulkAssign = () => { StudentsState.modal = 'bulkAssign'; Router.render(); };
    Pages.Students._showImport = () => {
      StudentsState.importMode = true;
      StudentsState.importTab = 'text';
      StudentsState.importRows = [];
      StudentsState.importFileName = '';
      StudentsState.importGroupId = '';
      Router.render();
    };

    Pages.Students._renderBulkAssignModal = () => {
      const { groups } = Store.get();
      return Components.Modal({
        title: '批量分配小组',
        onClose: 'StudentsState.modal=null; Router.render();',
        content: `
          <div class="space-y-4">
            <p class="text-sm text-gray-600">为 ${StudentsState.selected.size} 名学生分配小组</p>
            <select id="bulk-group-select" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
              <option value="">未分组（${Store.get().students.filter(s => !s.groupId).length}人）</option>
              ${groups.map(g => `<option value="${g.id}">${escapeHtml(g.name)}（${Store.get().students.filter(s => s.groupId === g.id).length}人）</option>`).join('')}
            </select>
            <div class="flex gap-2">
              <button onclick="StudentsState.modal=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
              <button onclick="const gid=$('#bulk-group-select').value; if(gid!==null){DB.assignGroup([...StudentsState.selected],gid||null); StudentsState.selected.clear(); StudentsState.modal=null; Components.toast('小组已分配'); Router.render();}" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">确认</button>
            </div>
          </div>
        `
      });
    };

    Pages.Students._renderImportModal = () => {
      return Components.Modal({
        title: '导入学生',
        onClose: 'StudentsState.importMode=null; Router.render();',
        content: `
          <div class="space-y-4">
            <div class="flex rounded-lg overflow-hidden border border-gray-200">
              <button onclick="StudentsState.importTab='text'; Router.render();" class="flex-1 py-2 text-sm ${StudentsState.importTab === 'text' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}">快速输入</button>
              <button onclick="StudentsState.importTab='csv'; Router.render();" class="flex-1 py-2 text-sm ${StudentsState.importTab === 'csv' ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'}">CSV 上传</button>
            </div>
            ${StudentsState.importTab === 'text' ? `
              <div>
                <label class="block text-sm text-gray-700 mb-1.5">输入学生名单（每行一个姓名）</label>
                <textarea id="import-names" rows="6" placeholder="张三&#10;李四&#10;王五" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"></textarea>
              </div>
            ` : `
              <div class="space-y-2">
                <label class="block text-sm text-gray-700">选择 CSV 文件（列: 姓名,性别,学号）</label>
                <input type="file" accept=".csv" onchange="Pages.Students._handleCsvFile(event)" class="w-full text-sm" />
                ${StudentsState.importFileName ? `<p class="text-xs text-indigo-600">已选择: ${escapeHtml(StudentsState.importFileName)} (${StudentsState.importRows.length} 条)</p>` : ''}
                ${StudentsState.importRows.length > 0 ? `
                  <div class="max-h-32 overflow-auto border border-gray-100 rounded-lg">
                    <table class="w-full text-xs">
                      <thead><tr class="bg-gray-50"><th class="text-left px-2 py-1">姓名</th><th class="text-left px-2 py-1">性别</th><th class="text-left px-2 py-1">学号</th></tr></thead>
                      <tbody>${StudentsState.importRows.slice(0, 5).map(r => `<tr><td class="px-2 py-1">${escapeHtml(r.name)}</td><td class="px-2 py-1">${escapeHtml(r.gender || '-')}</td><td class="px-2 py-1">${escapeHtml(r.studentId || '-')}</td></tr>`).join('')}</tbody>
                    </table>
                  </div>
                ` : ''}
              </div>
            `}
            <div>
              <label class="block text-sm text-gray-700 mb-1.5">批量分配小组（可选）</label>
              <select id="import-group-input" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="">未分组（${Store.get().students.filter(s => !s.groupId).length}人）</option>
                ${Store.get().groups.map(g => `<option value="${g.id}" ${StudentsState.importGroupId === g.id ? 'selected' : ''}>${escapeHtml(g.name)}（${Store.get().students.filter(s => s.groupId === g.id).length}人）</option>`).join('')}
              </select>
            </div>
            <div class="flex gap-2">
              <button onclick="StudentsState.importMode=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
              <button onclick="Pages.Students._confirmImport()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">导入</button>
            </div>
          </div>
        `
      });
    };

    Pages.Students._handleCsvFile = (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      StudentsState.importFileName = file.name;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = String(ev.target?.result || '');
        const lines = text.split(/\r?\n/).filter(Boolean);
        const start = /姓名|name|学生/i.test(lines[0] || '') ? 1 : 0;
        StudentsState.importRows = lines.slice(start).map(line => {
          const cols = line.split(',').map(c => c.trim());
          return { name: cols[0] || '', gender: cols[1] || '', studentId: cols[2] || '' };
        }).filter(r => r.name);
        Router.render();
      };
      reader.readAsText(file, 'UTF-8');
    };

    Pages.Students._confirmImport = () => {
      const groupId = $('#import-group-input')?.value || null;
      let rows = [];
      if (StudentsState.importTab === 'text') {
        const txt = $('#import-names')?.value || '';
        rows = txt.split('\n').map(x => ({ name: x.trim() })).filter(x => x.name);
      } else {
        rows = StudentsState.importRows;
      }
      if (!rows.length) return Components.toast('没有可导入的数据', 'error');
      const count = DB.importStudents(rows, groupId);
      StudentsState.importMode = null;
      Components.toast(`已导入 ${count} 名学生`);
      Router.render();
    };

    // ── Groups ──────────────────────────────────────────────────────────
    const GroupsState = { modal: null, editing: null, deleting: null };
    const COLOR_PRESETS = ['#6366f1', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#06b6d4', '#f97316', '#ec4899', '#14b8a6', '#84cc16'];

    Pages.Groups = () => {
      const { groups, students } = Store.get();
      const groupStats = groups.map(g => {
        const members = students.filter(s => s.groupId === g.id);
        const totalPoints = DB.getGroupTotalPoints(g.id);
        const avgPoints = members.length > 0 ? Math.round(totalPoints / members.length) : 0;
        return { ...g, members, totalPoints, avgPoints };
      }).sort((a, b) => b.totalPoints - a.totalPoints);
      const maxPoints = Math.max(...groupStats.map(g => g.totalPoints), 1);

      return `
        <div class="p-6 max-w-5xl mx-auto space-y-5">
          <div class="flex items-center justify-between">
            <div><h1 class="text-gray-900 text-xl">小组管理</h1><p class="text-sm text-gray-500 mt-0.5">共 ${groups.length} 个小组 · ${students.filter(s => !s.groupId).length} 名未分组</p></div>
            <button onclick="GroupsState.modal = 'add'; Router.render();" class="flex items-center gap-1.5 px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm hover:bg-indigo-700">${Icons.plus} 新建小组</button>
          </div>

          <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
            <h3 class="text-gray-800 mb-4 flex items-center gap-2"><span class="text-amber-500">🏆</span> 小组积分排行</h3>
            ${groupStats.length === 0 ? '<p class="text-sm text-gray-400 text-center py-6">暂无小组，请先创建小组</p>' : `
              <div class="space-y-3">
                ${groupStats.map((g, i) => `
                  <div class="flex items-center gap-4">
                    <div class="w-7 text-center"><span class="text-sm font-semibold text-gray-500">${i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `#${i+1}`}</span></div>
                    <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-medium flex-shrink-0" style="background-color: ${g.color}">${escapeHtml(g.name.slice(0, 1))}</div>
                    <div class="flex-1 min-w-0">
                      <div class="flex items-center justify-between mb-1"><span class="text-sm font-medium text-gray-800">${escapeHtml(g.name)}</span><div class="text-sm text-gray-600"><span class="font-semibold text-gray-900">${g.totalPoints}</span> 分 · 均 ${g.avgPoints} 分</div></div>
                      <div class="h-2 bg-gray-100 rounded-full overflow-hidden"><div class="h-full rounded-full transition-all" style="width: ${(g.totalPoints / maxPoints) * 100}%; background-color: ${g.color}"></div></div>
                      <p class="text-xs text-gray-400 mt-0.5">${g.members.length} 名成员</p>
                    </div>
                  </div>
                `).join('')}
              </div>
            `}
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            ${groupStats.map(g => `
              <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                <div class="flex items-start justify-between mb-4">
                  <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl flex items-center justify-center text-white font-semibold" style="background-color: ${g.color}">${escapeHtml(g.name.slice(0, 1))}</div>
                    <div><h4 class="text-gray-900">${escapeHtml(g.name)}</h4><p class="text-xs text-gray-400">${g.members.length} 名成员</p></div>
                  </div>
                  <div class="flex gap-1">
                    <button onclick="GroupsState.editing = Store.get().groups.find(x=>x.id==='${g.id}'); GroupsState.modal = 'edit'; Router.render();" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">${Icons.edit2}</button>
                    <button onclick="GroupsState.deleting = Store.get().groups.find(x=>x.id==='${g.id}'); GroupsState.modal = 'delete'; Router.render();" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg">${Icons.trash2}</button>
                  </div>
                </div>
                <div class="grid grid-cols-2 gap-3 mb-4">
                  <div class="bg-gray-50 rounded-lg p-3"><p class="text-xs text-gray-400 mb-0.5">总积分</p><p class="text-lg font-semibold text-gray-900">${g.totalPoints}</p></div>
                  <div class="bg-gray-50 rounded-lg p-3"><p class="text-xs text-gray-400 mb-0.5">人均积分</p><p class="text-lg font-semibold text-gray-900">${g.avgPoints}</p></div>
                </div>
                <div>
                  <p class="text-xs text-gray-500 mb-2 flex items-center gap-1">${Icons.users} 成员列表</p>
                  ${g.members.length === 0 ? '<p class="text-xs text-gray-400 italic">暂无成员</p>' : `
                    <div class="space-y-1.5 max-h-32 overflow-y-auto scrollbar-thin">
                      ${g.members.sort((a, b) => b.totalPoints - a.totalPoints).map(m => `
                        <div class="flex items-center justify-between">
                          <div class="flex items-center gap-2">
                            <div class="w-5 h-5 rounded-full flex items-center justify-center text-white text-xs" style="background-color: ${g.color}">${escapeHtml(m.name.slice(0, 1))}</div>
                            <span class="text-xs text-gray-700">${escapeHtml(m.name)}</span>
                          </div>
                          <span class="text-xs font-medium text-gray-600">${m.totalPoints} 分</span>
                        </div>
                      `).join('')}
                    </div>
                  `}
                </div>
              </div>
            `).join('')}

            ${students.filter(s => !s.groupId).length > 0 ? `
              <div class="bg-white rounded-xl border border-dashed border-gray-200 p-5">
                <div class="flex items-center gap-3 mb-3">
                  <div class="w-10 h-10 rounded-xl bg-gray-100 flex items-center justify-center">${Icons.users}</div>
                  <div><h4 class="text-gray-500">未分组</h4><p class="text-xs text-gray-400">${students.filter(s => !s.groupId).length} 名成员</p></div>
                </div>
                <p class="text-xs text-gray-400 text-center py-3 bg-gray-50 rounded-lg">前往「学生管理」→ 筛选「未分组」→ 批量指派小组</p>
              </div>
            ` : ''}
          </div>

          ${GroupsState.modal === 'add' ? Pages.Groups._renderModal('新建小组') : ''}
          ${GroupsState.modal === 'edit' ? Pages.Groups._renderModal('编辑小组', GroupsState.editing) : ''}
          ${GroupsState.modal === 'delete' ? Pages.Groups._renderDeleteModal() : ''}
        </div>
      `;
    };

    Pages.Groups._renderModal = (title, initial = null) => {
      const name = initial?.name || '';
      const color = initial?.color || '#6366f1';
      return Components.Modal({
        title,
        onClose: 'GroupsState.modal=null; GroupsState.editing=null; GroupsState.selectedColor="#6366f1"; Router.render();',
        content: `
          <div class="space-y-4" id="group-modal-container">
            <div>

              <input id="group-name-input" value="${escapeHtml(name)}" placeholder="如：四大天王、精英组..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300" oninput="document.getElementById('group-name-preview').textContent=this.value||'小组名称预览'; document.getElementById('group-badge-preview').textContent=this.value||'预览'; document.getElementById('group-icon-preview').textContent=(this.value||'组').slice(0,1);" />

      });
    };

    let _selectedGroupColor = '#6366f1';
    Pages.Groups._selectColor = (c) => {
      _selectedGroupColor = c;
      document.getElementById('color-display').textContent = c;
      document.getElementById('group-color-input').value = c;
      document.getElementById('group-icon-preview').style.backgroundColor = c;
      document.getElementById('group-badge-preview').style.backgroundColor = c;
      document.querySelectorAll('.group-color-btn').forEach(btn => {
        btn.style.outline = btn.style.backgroundColor === c ? '3px solid ' + c : 'none';
      });
    };

    Pages.Groups._saveGroup = () => {
      const name = $('#group-name-input')?.value.trim();
      const color = $('#group-color-input')?.value || '#6366f1';
      if (!name) return Components.toast('请输入小组名称', 'error');

      if (GroupsState.modal === 'edit') {
        DB.updateGroup(GroupsState.editing.id, name, color);
        Components.toast('小组已更新');
      } else {
        DB.addGroup(name, color);
        Components.toast('小组已创建');
      }
      GroupsState.modal = null;
      GroupsState.editing = null;
      Router.render();
    };

    Pages.Groups._renderDeleteModal = () => {
      const g = GroupsState.deleting;
      return Components.Modal({
        title: '删除小组',
        onClose: 'GroupsState.modal=null; GroupsState.deleting=null; Router.render();',
        content: `
          <div class="space-y-4">
            <p class="text-sm text-gray-600">确定删除「${escapeHtml(g.name)}」小组吗？</p>
            <p class="text-sm text-amber-600">⚠️ 该小组的成员将变为"未分组"状态。</p>
            <div class="flex gap-2">
              <button onclick="GroupsState.modal=null; GroupsState.deleting=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm text-gray-700 hover:bg-gray-50">取消</button>
              <button onclick="DB.deleteGroup('${g.id}'); GroupsState.modal=null; GroupsState.deleting=null; Components.toast('小组已删除'); Router.render();" class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg text-sm hover:bg-red-700">确认删除</button>
            </div>
          </div>
        `
      });
    };
    const RuleIconOptions = ['✅','🙋','📝','🤝','🏆','⭐','🎯','💡','🔥','📚','🎓','💪','🌟','👍','❤️','⏰','🔇','📋','❌','⚠️','😴','🚫'];
    const PointsState = { selected: new Set(), mode: 'earn', customPoints: '', reason: '', filterGroup: '', search: '', message: '' };
    const RulesState = { modal: null, editing: null };
    const RecordsState = { type: '', studentId: '', search: '', page: 1, pageSize: 20 };
    const ShopState = { modal: null, editing: null, redeeming: null };
    const ToolsState = { timerRunning: false, timerTotal: 300, timerRemaining: 300, timerInput: '', timerTick: null, randomGroup: '', randomCount: 1, randomResult: [], randomDisplay: '', randomSpinning: false };
    const SettingsState = { confirmReset: false, confirmText: '' };

    function toCSVLine(fields) {
      return fields.map(v => {
        const s = String(v ?? '');
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(',');
    }
    function downloadCSV(content, filename) {
      const blob = new Blob(['\uFEFF' + content], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }
    function downloadJSON(data, filename) {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = filename; a.click();
      URL.revokeObjectURL(url);
    }

    Pages.Points = () => {
      const { students, groups, rules } = Store.get();
      const ungroupedCount = students.filter(s => !s.groupId).length;
      const groupCount = (gid) => students.filter(s => s.groupId === gid).length;
      const filtered = students.filter(s => {
        const mg = !PointsState.filterGroup || (PointsState.filterGroup === '__none__' ? !s.groupId : s.groupId === PointsState.filterGroup);
        const ms = !PointsState.search || s.name.includes(PointsState.search);
        return mg && ms;
      });
      const positiveRules = rules.filter(r => r.points > 0);
      const negativeRules = rules.filter(r => r.points < 0);
      return `
        <div class="p-6 max-w-5xl mx-auto space-y-5">
          <div><h1 class="text-gray-900 text-xl">积分操作</h1><p class="text-sm text-gray-500 mt-0.5">选择学生后，应用积分规则或自定义加减分</p></div>
          ${PointsState.message ? `<div class="px-4 py-2 text-sm bg-emerald-50 border border-emerald-200 rounded-lg text-emerald-700">${escapeHtml(PointsState.message)}</div>` : ''}
          <div class="grid grid-cols-1 lg:grid-cols-5 gap-5">
            <div class="lg:col-span-2 bg-white rounded-xl border border-gray-100 shadow-sm p-4 space-y-3">
              <div class="flex items-center justify-between"><h3 class="text-gray-800">选择学生</h3><span class="text-xs text-indigo-600 bg-indigo-50 px-2 py-0.5 rounded-full">已选 ${PointsState.selected.size} 人</span></div>
              <select onchange="PointsState.filterGroup=this.value; Router.render();" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white">
                <option value="">全部学生</option><option value="__none__" ${PointsState.filterGroup === '__none__' ? 'selected' : ''}>未分组（${ungroupedCount}人）</option>
                ${groups.map(g => `<option value="${g.id}" ${PointsState.filterGroup === g.id ? 'selected' : ''}>${escapeHtml(g.name)}（${groupCount(g.id)}人）</option>`).join('')}
              </select>
              <input value="${escapeHtml(PointsState.search)}" oninput="PointsState.search=this.value; Router.render();" placeholder="搜索姓名..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
              <div class="flex gap-2">
                <button onclick="filteredStudentsForPoints().forEach(s=>PointsState.selected.add(s.id)); Router.render();" class="flex-1 text-xs py-1.5 border border-indigo-200 text-indigo-600 rounded-lg">全选</button>
                <button onclick="PointsState.selected.clear(); Router.render();" class="flex-1 text-xs py-1.5 border border-gray-200 text-gray-600 rounded-lg">清除</button>
              </div>
              <div class="space-y-1.5 max-h-80 overflow-y-auto scrollbar-thin">
                ${filtered.map(s => {
                  const g = groups.find(x => x.id === s.groupId);
                  const checked = PointsState.selected.has(s.id);
                  return `<button onclick="togglePointStudent('${s.id}')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg border text-left ${checked ? 'border-indigo-300 bg-indigo-50' : 'border-gray-100 hover:bg-gray-50'}">
                    <input type="checkbox" ${checked ? 'checked' : ''} class="pointer-events-none" />
                    <div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs" style="background-color:${g?.color || '#9ca3af'}">${escapeHtml(s.name.slice(0,1))}</div>
                    <div><p class="text-sm text-gray-800">${escapeHtml(s.name)}</p><p class="text-xs text-gray-400">${escapeHtml(g?.name || '未分组')} · ${s.availablePoints} 分可用</p></div>
                  </button>`;
                }).join('')}
              </div>
            </div>
            <div class="lg:col-span-3 space-y-4">
              <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5">
                <h3 class="text-gray-800 mb-3">快速应用规则</h3>
                ${positiveRules.length ? `<p class="text-xs text-gray-400 mb-2">加分规则</p><div class="flex flex-wrap gap-2 mb-3">${positiveRules.map(r => `<button onclick="applyRuleById('${r.id}')" ${PointsState.selected.size === 0 ? 'disabled' : ''} class="px-3 py-1.5 bg-emerald-50 border border-emerald-200 text-emerald-700 rounded-lg text-sm ${PointsState.selected.size === 0 ? 'opacity-40' : ''}">${escapeHtml(r.icon)} ${escapeHtml(r.name)} +${r.points}</button>`).join('')}</div>` : ''}
                ${negativeRules.length ? `<p class="text-xs text-gray-400 mb-2">扣分规则</p><div class="flex flex-wrap gap-2">${negativeRules.map(r => `<button onclick="applyRuleById('${r.id}')" ${PointsState.selected.size === 0 ? 'disabled' : ''} class="px-3 py-1.5 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm ${PointsState.selected.size === 0 ? 'opacity-40' : ''}">${escapeHtml(r.icon)} ${escapeHtml(r.name)} ${r.points}</button>`).join('')}</div>` : ''}
                ${rules.length === 0 ? '<p class="text-sm text-gray-400 text-center py-4">暂无积分规则，请先添加</p>' : ''}
              </div>
              <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 space-y-3">
                <h3 class="text-gray-800">自定义积分</h3>
                <div class="flex rounded-lg overflow-hidden border border-gray-200 w-fit">
                  <button onclick="PointsState.mode='earn'; Router.render();" class="px-4 py-2 text-sm ${PointsState.mode === 'earn' ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600'}">加分</button>
                  <button onclick="PointsState.mode='deduct'; Router.render();" class="px-4 py-2 text-sm ${PointsState.mode === 'deduct' ? 'bg-red-600 text-white' : 'bg-white text-gray-600'}">扣分</button>
                </div>
                <input type="number" min="1" value="${escapeHtml(PointsState.customPoints)}" oninput="PointsState.customPoints=this.value" placeholder="输入分数" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
                <input value="${escapeHtml(PointsState.reason)}" oninput="PointsState.reason=this.value" placeholder="填写原因..." class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" />
                <button onclick="applyCustomPoints()" ${PointsState.selected.size === 0 ? 'disabled' : ''} class="w-full py-2.5 rounded-lg text-sm text-white ${PointsState.mode === 'earn' ? 'bg-emerald-600' : 'bg-red-600'} ${PointsState.selected.size === 0 ? 'opacity-40' : ''}">确认${PointsState.mode === 'earn' ? '加' : '扣'}分 (${PointsState.selected.size} 人)</button>
              </div>
            </div>
          </div>
        </div>
      `;
    };

    Pages.Rules = () => {
      const { rules, records } = Store.get();
      const pRules = rules.filter(r => r.points > 0);
      const nRules = rules.filter(r => r.points < 0);
      const usage = (id) => records.filter(r => r.ruleId === id).length;
      const card = (rule) => `<div class="bg-white rounded-xl border border-gray-100 shadow-sm p-4 flex items-center gap-4">
        <div class="w-11 h-11 rounded-xl flex items-center justify-center text-xl ${rule.points > 0 ? 'bg-emerald-50' : 'bg-red-50'}">${escapeHtml(rule.icon)}</div>
        <div class="flex-1"><p class="text-sm font-medium text-gray-800">${escapeHtml(rule.name)}</p><p class="text-xs text-gray-400 mt-0.5">已使用 ${usage(rule.id)} 次</p></div>
        <div class="text-lg font-bold ${rule.points > 0 ? 'text-emerald-600' : 'text-red-600'}">${rule.points > 0 ? '+' : ''}${rule.points}</div>
        <div class="flex gap-1"><button onclick="RulesState.editing=Store.get().rules.find(r=>r.id==='${rule.id}'); RulesState.modal='edit'; Router.render();" class="p-1.5 text-gray-400 hover:text-indigo-600 hover:bg-indigo-50 rounded-lg">${Icons.edit2}</button><button onclick="deleteRule('${rule.id}')" class="p-1.5 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg">${Icons.trash2}</button></div>
      </div>`;
      return `
        <div class="p-6 max-w-3xl mx-auto space-y-5">
          <div class="flex items-center justify-between"><div><h1 class="text-gray-900 text-xl">积分规则</h1><p class="text-sm text-gray-500 mt-0.5">定义规则后，可在积分操作页一键套用</p></div><button onclick="RulesState.modal='add'; Router.render();" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">新建规则</button></div>
          <div class="grid grid-cols-3 gap-3">
            <div class="bg-white rounded-xl border border-gray-100 p-4 text-center"><p class="text-2xl font-semibold text-gray-900">${rules.length}</p><p class="text-xs text-gray-400">规则总数</p></div>
            <div class="bg-emerald-50 rounded-xl border border-emerald-100 p-4 text-center"><p class="text-2xl font-semibold text-emerald-700">${pRules.length}</p><p class="text-xs text-emerald-500">加分规则</p></div>
            <div class="bg-red-50 rounded-xl border border-red-100 p-4 text-center"><p class="text-2xl font-semibold text-red-700">${nRules.length}</p><p class="text-xs text-red-500">扣分规则</p></div>
          </div>
          ${pRules.length ? `<div><h3 class="text-gray-700 mb-2">加分规则</h3><div class="space-y-2">${pRules.map(card).join('')}</div></div>` : ''}
          ${nRules.length ? `<div><h3 class="text-gray-700 mb-2">扣分规则</h3><div class="space-y-2">${nRules.map(card).join('')}</div></div>` : ''}
          ${rules.length === 0 ? '<div class="text-center py-10 bg-white rounded-xl border border-dashed border-gray-200 text-sm text-gray-400">暂无积分规则</div>' : ''}
          ${RulesState.modal ? renderRuleModal() : ''}
        </div>
      `;
    };

    Pages.Records = () => {
      const { records, students, groups } = Store.get();
      const filtered = [...records].filter(r => {
        const s = students.find(st => st.id === r.studentId);
        const mt = !RecordsState.type || r.type === RecordsState.type;
        const ms = !RecordsState.studentId || r.studentId === RecordsState.studentId;
        const mk = !RecordsState.search || r.reason.includes(RecordsState.search) || (s?.name || '').includes(RecordsState.search);
        return mt && ms && mk;
      }).sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      const totalPages = Math.max(1, Math.ceil(filtered.length / RecordsState.pageSize));
      if (RecordsState.page > totalPages) RecordsState.page = totalPages;
      const pageItems = filtered.slice((RecordsState.page - 1) * RecordsState.pageSize, RecordsState.page * RecordsState.pageSize);
      const stats = {
        earn: records.filter(r => r.type === 'earn').reduce((s, r) => s + r.points, 0),
        deduct: records.filter(r => r.type === 'deduct').reduce((s, r) => s + r.points, 0),
        redeem: records.filter(r => r.type === 'redeem').reduce((s, r) => s + r.points, 0),
      };
      return `
        <div class="p-6 max-w-5xl mx-auto space-y-5">
          <div><h1 class="text-gray-900 text-xl">积分记录</h1><p class="text-sm text-gray-500 mt-0.5">所有积分变动的历史记录</p></div>
          <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
            <div class="bg-white rounded-xl border border-gray-100 p-4 text-center"><p class="text-2xl font-semibold text-gray-900">${records.length}</p><p class="text-xs text-gray-400">总记录数</p></div>
            <div class="bg-emerald-50 rounded-xl border border-emerald-100 p-4 text-center"><p class="text-2xl font-semibold text-emerald-700">+${stats.earn}</p><p class="text-xs text-emerald-500">累计加分</p></div>
            <div class="bg-red-50 rounded-xl border border-red-100 p-4 text-center"><p class="text-2xl font-semibold text-red-700">-${stats.deduct}</p><p class="text-xs text-red-500">累计扣分</p></div>
            <div class="bg-purple-50 rounded-xl border border-purple-100 p-4 text-center"><p class="text-2xl font-semibold text-purple-700">${stats.redeem}</p><p class="text-xs text-purple-500">累计兑换</p></div>
          </div>
          <div class="flex flex-wrap gap-3">
            <input value="${escapeHtml(RecordsState.search)}" oninput="RecordsState.search=this.value; RecordsState.page=1; Router.render();" placeholder="搜索原因或学生..." class="flex-1 min-w-40 px-3 py-2 border border-gray-200 rounded-lg text-sm" />
            <select onchange="RecordsState.type=this.value; RecordsState.page=1; Router.render();" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white"><option value="">全部类型</option><option value="earn" ${RecordsState.type === 'earn' ? 'selected' : ''}>加分</option><option value="deduct" ${RecordsState.type === 'deduct' ? 'selected' : ''}>扣分</option><option value="redeem" ${RecordsState.type === 'redeem' ? 'selected' : ''}>兑换</option></select>
            <select onchange="RecordsState.studentId=this.value; RecordsState.page=1; Router.render();" class="px-3 py-2 border border-gray-200 rounded-lg text-sm bg-white"><option value="">全部学生</option>${students.map(s => `<option value="${s.id}" ${RecordsState.studentId === s.id ? 'selected' : ''}>${escapeHtml(s.name)}</option>`).join('')}</select>
          </div>
          <div class="bg-white rounded-xl border border-gray-100 shadow-sm overflow-hidden">
            <table class="w-full"><thead><tr class="border-b border-gray-100 bg-gray-50"><th class="text-left px-4 py-3 text-xs text-gray-500">时间</th><th class="text-left px-4 py-3 text-xs text-gray-500">学生</th><th class="text-left px-4 py-3 text-xs text-gray-500">类型</th><th class="text-left px-4 py-3 text-xs text-gray-500">原因</th><th class="text-right px-4 py-3 text-xs text-gray-500">积分变动</th></tr></thead>
              <tbody class="divide-y divide-gray-50">${pageItems.map(rec => {

                return `<tr><td class="px-4 py-3 text-xs text-gray-500">${formatDate(rec.createdAt)}</td><td class="px-4 py-3"><div class="flex items-center gap-2"><div class="w-7 h-7 rounded-full flex items-center justify-center text-white text-xs" style="background-color:${g?.color || '#9ca3af'}">${escapeHtml((s?.name || '?').slice(0,1))}</div><div><p class="text-sm text-gray-800">${escapeHtml(s?.name || '未知')}</p><p class="text-xs text-gray-400">${escapeHtml(g?.name || '未分组')}</p></div></div></td><td class="px-4 py-3"><span class="inline-flex px-2 py-0.5 rounded-full text-xs border ${cls}">${label}</span></td><td class="px-4 py-3 text-sm text-gray-700">${escapeHtml(rec.reason)}</td><td class="px-4 py-3 text-right text-sm font-semibold ${rec.type === 'earn' ? 'text-emerald-600' : 'text-red-600'}">${rec.type === 'earn' ? '+' : '-'}${rec.points}</td></tr>`;
              }).join('')}</tbody>
            </table>
            ${pageItems.length === 0 ? '<div class="text-center py-10 text-sm text-gray-400">暂无匹配记录</div>' : ''}
          </div>
          ${totalPages > 1 ? `<div class="flex items-center justify-between text-sm text-gray-500"><span>共 ${filtered.length} 条记录</span><div class="flex items-center gap-2"><button onclick="RecordsState.page=Math.max(1,RecordsState.page-1); Router.render();" class="px-3 py-1.5 border border-gray-200 rounded-lg">上一页</button><span>${RecordsState.page}/${totalPages}</span><button onclick="RecordsState.page=Math.min(${totalPages},RecordsState.page+1); Router.render();" class="px-3 py-1.5 border border-gray-200 rounded-lg">下一页</button></div></div>` : ''}
        </div>
      `;
    };

    Pages.Shop = () => {
      const { shopItems } = Store.get();
      const totalSold = shopItems.reduce((s, i) => s + i.sold, 0);
      return `
        <div class="p-6 max-w-5xl mx-auto space-y-5">
          <div class="flex items-center justify-between"><div><h1 class="text-gray-900 text-xl">积分商店</h1><p class="text-sm text-gray-500 mt-0.5">学生可用积分兑换奖励</p></div><button onclick="ShopState.modal='add'; Router.render();" class="px-3 py-2 bg-indigo-600 text-white rounded-lg text-sm">添加奖励</button></div>
          <div class="grid grid-cols-3 gap-3">

              <div class="flex items-center justify-center gap-2"><button onclick="resetTimer()" class="px-4 py-2 border border-gray-200 rounded-lg text-sm">重置</button><button onclick="toggleTimer()" class="px-5 py-2 rounded-lg text-sm text-white ${ToolsState.timerRunning ? 'bg-amber-500' : 'bg-indigo-600'}">${ToolsState.timerRunning ? '暂停' : '开始'}</button></div>

              </div>

                ${ToolsState.randomSpinning ? `<div><div class="text-4xl font-bold text-indigo-700">${escapeHtml(ToolsState.randomDisplay || '')}</div><p class="text-xs text-indigo-400 mt-2">抽取中...</p></div>` : ToolsState.randomResult.length ? `<div><p class="text-sm text-emerald-700 mb-3">已抽取 ${ToolsState.randomResult.length} 名学生</p><div class="flex flex-wrap justify-center gap-2">${ToolsState.randomResult.map(sx => `<span class="px-3 py-1 bg-white rounded-full text-sm border border-indigo-100">${escapeHtml(sx.name)}</span>`).join('')}</div></div>` : '<p class="text-sm text-gray-500">点击下方按钮随机点名</p>'}

              <button onclick="spinRandomStudents()" ${pool.length === 0 || ToolsState.randomSpinning ? 'disabled' : ''} class="w-full py-2.5 rounded-lg text-sm text-white bg-purple-600 ${pool.length === 0 || ToolsState.randomSpinning ? 'opacity-50' : 'hover:bg-purple-700'}">${ToolsState.randomSpinning ? '抽取中...' : '随机点名'}</button>

            <div class="grid grid-cols-2 md:grid-cols-3 gap-3">
              ${[
                ['学生人数', `${students.length} 人`], ['小组数量', `${groups.length} 个`], ['积分规则', `${rules.length} 条`],
                ['积分记录', `${records.length} 条`], ['商店奖励', `${shopItems.length} 件`], ['累计兑换', `${totalRedeemed} 次`],

          </div>
          <div class="bg-white rounded-xl border border-gray-100 shadow-sm p-5 space-y-2">
            <h3 class="text-gray-800 mb-2">导出数据</h3>
