            <button onclick="exportRecordsCsv()" class="w-full text-left px-3 py-2 bg-gray-50 rounded-lg text-sm hover:bg-gray-100">导出积分记录（CSV）</button>
            <button onclick="downloadJSON({rules:Store.get().rules,exportedAt:new Date().toISOString()}, '积分规则_'+new Date().toLocaleDateString('zh-CN')+'.json')" class="w-full text-left px-3 py-2 bg-gray-50 rounded-lg text-sm hover:bg-gray-100">导出积分规则（JSON）</button>
            <button onclick="downloadJSON({...Store.get(), exportedAt:new Date().toISOString()}, '班级数据备份_'+new Date().toLocaleDateString('zh-CN')+'.json')" class="w-full text-left px-3 py-2 bg-gray-50 rounded-lg text-sm hover:bg-gray-100">导出完整数据（JSON）</button>
          </div>
          <div class="bg-white rounded-xl border border-red-200 shadow-sm p-5">
            <h3 class="text-red-700 mb-3">危险操作</h3>
            ${!SettingsState.confirmReset ? `
              <div class="flex items-start justify-between gap-4"><div><p class="text-sm font-medium text-gray-800">积分清零</p><p class="text-xs text-gray-500 mt-1">将所有学生积分清零并清除积分记录。此操作不可恢复。</p></div><button onclick="SettingsState.confirmReset=true; Router.render();" class="px-3 py-1.5 bg-red-600 text-white rounded-lg text-sm">积分清零</button></div>
            ` : `
              <div class="space-y-3"><div class="text-sm text-red-600 bg-red-50 rounded-lg px-3 py-2">此操作将清除 ${students.length} 名学生积分和 ${records.length} 条记录，无法恢复。</div><input value="${escapeHtml(SettingsState.confirmText)}" oninput="SettingsState.confirmText=this.value" placeholder="请输入 确认清零" class="w-full border border-red-300 rounded-lg px-3 py-2 text-sm" /><div class="flex gap-2"><button onclick="SettingsState.confirmReset=false; SettingsState.confirmText=''; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm">取消</button><button onclick="confirmResetPoints()" ${SettingsState.confirmText !== '确认清零' ? 'disabled' : ''} class="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg text-sm ${SettingsState.confirmText !== '确认清零' ? 'opacity-50' : ''}">执行清零</button></div></div>
            `}
          </div>
          <p class="text-xs text-gray-400 text-center">所有数据保存在浏览器 LocalStorage 中，建议定期导出备份。</p>
        </div>
      `;
    };

    function filteredStudentsForPoints() {
      const { students } = Store.get();
      return students.filter(s => {
        const mg = !PointsState.filterGroup || (PointsState.filterGroup === '__none__' ? !s.groupId : s.groupId === PointsState.filterGroup);
        const ms = !PointsState.search || s.name.includes(PointsState.search);
        return mg && ms;
      });
    }
    function togglePointStudent(id) {
      if (PointsState.selected.has(id)) PointsState.selected.delete(id);
      else PointsState.selected.add(id);
      Router.render();
    }
    function applyRuleById(ruleId) {
      const rule = Store.get().rules.find(r => r.id === ruleId);
      if (!rule || PointsState.selected.size === 0) return;
      DB.applyPoints([...PointsState.selected], rule.points, rule.name, rule.id);
      PointsState.message = `已为 ${PointsState.selected.size} 名学生应用规则「${rule.name}」`;
      setTimeout(() => { PointsState.message = ''; Router.render(); }, 2000);
      Router.render();
    }
    function applyCustomPoints() {
      const pts = parseInt(PointsState.customPoints, 10);
      if (!pts || pts <= 0 || !PointsState.reason.trim() || PointsState.selected.size === 0) return Components.toast('请完善积分与原因', 'error');
      const signed = PointsState.mode === 'earn' ? pts : -pts;
      DB.applyPoints([...PointsState.selected], signed, PointsState.reason.trim());
      PointsState.customPoints = '';
      PointsState.reason = '';
      PointsState.message = `已为 ${PointsState.selected.size} 名学生${PointsState.mode === 'earn' ? '加' : '扣'} ${pts} 分`;
      setTimeout(() => { PointsState.message = ''; Router.render(); }, 2000);
      Router.render();
    }

    function renderRuleModal() {
      const edit = RulesState.modal === 'edit';
      const current = RulesState.editing || { name: '', points: 5, icon: '⭐' };
      const isPositive = (current.points ?? 1) >= 0;
      return Components.Modal({
        title: edit ? '编辑规则' : '新建规则',
        onClose: 'RulesState.modal=null; RulesState.editing=null; Router.render();',
        content: `<div class="space-y-4">
          <div><label class="block text-sm text-gray-700 mb-2">图标</label><div class="flex flex-wrap gap-2">${RuleIconOptions.map(ic => `<button onclick="document.getElementById('rule-icon-input').value='${ic}'" class="w-9 h-9 rounded-lg bg-gray-100 hover:bg-gray-200 flex items-center justify-center text-lg">${ic}</button>`).join('')}</div><input id="rule-icon-input" value="${escapeHtml(current.icon || '⭐')}" class="mt-2 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" /></div>
          <div><label class="block text-sm text-gray-700 mb-1.5">规则名称</label><input id="rule-name-input" value="${escapeHtml(current.name || '')}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" /></div>
          <div><label class="block text-sm text-gray-700 mb-1.5">积分值（正数）</label><input id="rule-points-input" type="number" min="1" value="${Math.abs(current.points || 5)}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" /></div>
          <div class="flex rounded-lg overflow-hidden border border-gray-200 w-fit"><button onclick="document.getElementById('rule-sign-input').value='+'" class="px-4 py-2 text-sm ${isPositive ? 'bg-emerald-600 text-white' : 'bg-white text-gray-600'}">加分</button><button onclick="document.getElementById('rule-sign-input').value='-'" class="px-4 py-2 text-sm ${!isPositive ? 'bg-red-600 text-white' : 'bg-white text-gray-600'}">扣分</button></div><input id="rule-sign-input" type="hidden" value="${isPositive ? '+' : '-'}" />
          <div class="flex gap-2"><button onclick="RulesState.modal=null; RulesState.editing=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm">取消</button><button onclick="saveRule()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">保存</button></div>
        </div>`,
      });
    }
    function saveRule() {
      const name = ($('#rule-name-input')?.value || '').trim();
      const icon = ($('#rule-icon-input')?.value || '⭐').trim() || '⭐';
      const p = parseInt($('#rule-points-input')?.value || '0', 10);
      const sign = $('#rule-sign-input')?.value === '-' ? -1 : 1;
      if (!name || !p || p <= 0) return Components.toast('请完善规则信息', 'error');
      const points = sign * p;
      if (RulesState.modal === 'edit') DB.updateRule(RulesState.editing.id, name, points, icon);
      else DB.addRule(name, points, icon);
      RulesState.modal = null;
      RulesState.editing = null;
      Components.toast('规则已保存');
      Router.render();
    }
    function deleteRule(id) {
      Components.confirm({ title: '删除规则', message: '确定删除该规则吗？历史记录将保留。', onConfirm: () => { DB.deleteRule(id); Components.toast('规则已删除'); Router.render(); } });
    }

    function renderShopModal() {
      if (ShopState.modal === 'add' || ShopState.modal === 'edit') {
        const item = ShopState.editing || { name: '', requiredPoints: 10, stock: 10, description: '' };
        const unlimited = item.stock === -1;
        return Components.Modal({
          title: ShopState.modal === 'edit' ? '编辑奖励' : '添加奖励',
          onClose: 'ShopState.modal=null; ShopState.editing=null; ShopState.redeeming=null; Router.render();',
          content: `<div class="space-y-4">
            <div><label class="block text-sm text-gray-700 mb-1.5">奖励名称</label><input id="shop-name-input" value="${escapeHtml(item.name || '')}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" /></div>
            <div><label class="block text-sm text-gray-700 mb-1.5">所需积分</label><input id="shop-points-input" type="number" min="1" value="${item.requiredPoints || 1}" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm" /></div>
            <div><label class="block text-sm text-gray-700 mb-1.5">库存</label><div class="flex items-center gap-2"><input id="shop-unlimited-input" type="checkbox" ${unlimited ? 'checked' : ''} onchange="const el=document.getElementById('shop-stock-input'); if(!el)return; el.disabled=this.checked; el.classList.toggle('opacity-50', this.checked);" /><span class="text-sm text-gray-600">不限库存</span></div><input id="shop-stock-input" type="number" min="0" value="${unlimited ? '' : item.stock}" class="mt-2 w-full border border-gray-200 rounded-lg px-3 py-2 text-sm ${unlimited ? 'opacity-50' : ''}" ${unlimited ? 'disabled' : ''} /></div>
            <div><label class="block text-sm text-gray-700 mb-1.5">描述</label><textarea id="shop-desc-input" rows="2" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm">${escapeHtml(item.description || '')}</textarea></div>
            <div class="flex gap-2"><button onclick="ShopState.modal=null; ShopState.editing=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm">取消</button><button onclick="saveShopItem()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">保存</button></div>
          </div>`,
        });
      }
      if (ShopState.modal === 'redeem') {
        const item = ShopState.redeeming;
        const { students } = Store.get();
        return Components.Modal({
          title: '兑换奖励',
          onClose: 'ShopState.modal=null; ShopState.redeeming=null; Router.render();',
          content: `<div class="space-y-4"><div class="bg-indigo-50 rounded-xl p-3"><p class="text-indigo-900 font-medium">${escapeHtml(item.name)}</p><p class="text-xs text-indigo-600">${item.requiredPoints} 积分</p></div><select id="redeem-student-input" class="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm bg-white"><option value="">请选择学生</option>${students.map(s => `<option value="${s.id}">${escapeHtml(s.name)} (${s.availablePoints} 分)</option>`).join('')}</select><div class="flex gap-2"><button onclick="ShopState.modal=null; ShopState.redeeming=null; Router.render();" class="flex-1 px-4 py-2 border border-gray-200 rounded-lg text-sm">取消</button><button onclick="confirmRedeemItem()" class="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg text-sm">确认兑换</button></div></div>`,
        });
      }
      return '';
    }
    function saveShopItem() {
      const name = ($('#shop-name-input')?.value || '').trim();
      const pts = parseInt($('#shop-points-input')?.value || '0', 10);
      const unlimited = !!$('#shop-unlimited-input')?.checked;
      const stock = unlimited ? -1 : parseInt($('#shop-stock-input')?.value || '0', 10);
      const desc = ($('#shop-desc-input')?.value || '').trim();
      if (!name || !pts || pts <= 0 || (!unlimited && (isNaN(stock) || stock < 0))) return Components.toast('请完善商品信息', 'error');
      if (ShopState.modal === 'edit') DB.updateShopItem(ShopState.editing.id, name, pts, stock, desc);
      else DB.addShopItem(name, pts, stock, desc);
      ShopState.modal = null;
      ShopState.editing = null;
      Components.toast('商品已保存');
      Router.render();
    }
    function deleteShopItem(id) {
      Components.confirm({ title: '删除奖励', message: '确定删除该奖励吗？', onConfirm: () => { DB.deleteShopItem(id); Components.toast('商品已删除'); Router.render(); } });
    }
    function confirmRedeemItem() {
      const sid = $('#redeem-student-input')?.value;
      if (!sid || !ShopState.redeeming) return Components.toast('请选择学生', 'error');
      const res = DB.redeemItem(sid, ShopState.redeeming.id);
      if (!res.success) return Components.toast(res.message, 'error');
      Components.toast(res.message);
      ShopState.modal = null;
      ShopState.redeeming = null;
      Router.render();
    }

    function setTimerMinutes(mins) {
      ToolsState.timerRunning = false;
      clearInterval(ToolsState.timerTick);
      ToolsState.timerTotal = mins * 60;
      ToolsState.timerRemaining = mins * 60;
      Router.render();
    }
    function applyCustomTimer() {
      const m = parseFloat(ToolsState.timerInput);
      if (!m || m <= 0) return;
      setTimerMinutes(m);
      ToolsState.timerInput = '';
    }
    function toggleTimer() {
      if (ToolsState.timerRemaining <= 0) return;
      ToolsState.timerRunning = !ToolsState.timerRunning;
      if (ToolsState.timerRunning) {
        ToolsState.timerTick = setInterval(() => {
          if (ToolsState.timerRemaining <= 1) {
            ToolsState.timerRemaining = 0;
            ToolsState.timerRunning = false;
            clearInterval(ToolsState.timerTick);
          } else {
            ToolsState.timerRemaining -= 1;
          }
          Router.render();
        }, 1000);
      } else {
        clearInterval(ToolsState.timerTick);
      }
      Router.render();
    }
    function resetTimer() {
      ToolsState.timerRunning = false;
      clearInterval(ToolsState.timerTick);
      ToolsState.timerRemaining = ToolsState.timerTotal;
      Router.render();
    }
    function spinRandomStudents() {
      const { students } = Store.get();
      const pool = students.filter(s => !ToolsState.randomGroup || (ToolsState.randomGroup === '__none__' ? !s.groupId : s.groupId === ToolsState.randomGroup));
      if (!pool.length) return;
      const count = Math.min(Math.max(1, parseInt(ToolsState.randomCount, 10) || 1), pool.length);
      let n = 0;
      ToolsState.randomSpinning = true;
      ToolsState.randomResult = [];
      Router.render();
      const t = setInterval(() => {
        ToolsState.randomDisplay = pool[Math.floor(Math.random() * pool.length)].name;
        n += 1;
        Router.render();
        if (n >= 16) {
          clearInterval(t);
          const picked = [...pool].sort(() => Math.random() - 0.5).slice(0, count);
          ToolsState.randomResult = picked;
          ToolsState.randomDisplay = '';
          ToolsState.randomSpinning = false;
          Router.render();
        }
      }, 80);
    }

    function exportStudentsCsv() {
      const { students, groups } = Store.get();
      const header = toCSVLine(['姓名', '小组', '总积分', '可用积分']);
      const rows = students.map(s => {
        const g = groups.find(x => x.id === s.groupId);
        return toCSVLine([s.name, g?.name || '未分组', s.totalPoints, s.availablePoints]);
      });
      downloadCSV([header, ...rows].join('\n'), `学生积分报表_${new Date().toLocaleDateString('zh-CN')}.csv`);
      Components.toast('学生报表已导出');
    }
    function exportRecordsCsv() {
      const { records, students, groups } = Store.get();
      const typeMap = { earn: '加分', deduct: '扣分', redeem: '兑换' };
      const header = toCSVLine(['时间', '学生', '小组', '类型', '积分', '原因']);
      const rows = [...records].sort((a, b) => b.createdAt.localeCompare(a.createdAt)).map(r => {
        const s = students.find(x => x.id === r.studentId);
        const g = groups.find(x => x.id === s?.groupId);
        const score = `${r.type === 'earn' ? '+' : '-'}${r.points}`;
        return toCSVLine([new Date(r.createdAt).toLocaleString('zh-CN'), s?.name || '未知', g?.name || '未分组', typeMap[r.type] || r.type, score, r.reason]);
      });
      downloadCSV([header, ...rows].join('\n'), `积分记录_${new Date().toLocaleDateString('zh-CN')}.csv`);
      Components.toast('积分记录已导出');
    }
    function confirmResetPoints() {
      if (SettingsState.confirmText !== '确认清零') return;
      DB.resetPoints();
      SettingsState.confirmReset = false;
      SettingsState.confirmText = '';
      Components.toast('已执行积分清零');
      Router.render();
    }

    // ──────────────────────────────────────────────────────────────
    // 8. 布局组件
    // ──────────────────────────────────────────────────────────────
    function Layout(content) {
      const currentRoute = Router.getCurrentRoute();
      const navItems = [
        { route: '', label: '总览', icon: Icons.barChart3 },
        { route: 'students', label: '学生管理', icon: Icons.users },
        { route: 'groups', label: '小组管理', icon: Icons.users },
        { route: 'points', label: '积分操作', icon: Icons.plus },
        { route: 'rules', label: '积分规则', icon: Icons.star },
        { route: 'records', label: '积分记录', icon: Icons.fileText },
        { route: 'shop', label: '积分商店', icon: Icons.trophy },
        { route: 'tools', label: '课堂工具', icon: Icons.shuffle },
        { route: 'settings', label: '数据管理', icon: Icons.settings },
      ];

      return `
        <div class="flex min-h-screen">
          <aside class="w-56 bg-white border-r border-gray-200 hidden md:block">
            <div class="p-4 border-b border-gray-100"><h1 class="text-lg font-semibold text-gray-900 flex items-center gap-2"><span class="text-2xl">🏆</span> 班级积分</h1></div>
            <nav class="p-3 space-y-0.5">
              ${navItems.map(item => `
                <button onclick="Router.navigate('${item.route}')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${currentRoute === item.route ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-50'}">${item.icon} ${item.label}</button>
              `).join('')}
            </nav>
          </aside>

          <div class="md:hidden fixed top-0 left-0 right-0 bg-white border-b border-gray-200 z-40 px-4 py-3 flex items-center justify-between">
            <h1 class="text-lg font-semibold text-gray-900">🏆 班级积分</h1>
            <button onclick="document.getElementById('mobile-menu')?.classList.toggle('hidden')" class="p-2 text-gray-600">${Icons.menu}</button>
          </div>

          <div id="mobile-menu" class="hidden md:hidden fixed inset-0 bg-black/50 z-50" onclick="this.classList.add('hidden')">
            <div class="bg-white w-56 h-full p-4" onclick="event.stopPropagation()">
              <div class="flex items-center justify-between mb-4"><h1 class="text-lg font-semibold">🏆 班级积分</h1><button onclick="document.getElementById('mobile-menu')?.classList.add('hidden')">${Icons.x}</button></div>
              <nav class="space-y-1">
                ${navItems.map(item => `
                  <button onclick="Router.navigate('${item.route}'); document.getElementById('mobile-menu')?.classList.add('hidden')" class="w-full flex items-center gap-2 px-3 py-2 rounded-lg text-sm ${currentRoute === item.route ? 'bg-indigo-50 text-indigo-700 font-medium' : 'text-gray-600 hover:bg-gray-50'}">${item.icon} ${item.label}</button>
                `).join('')}
              </nav>
            </div>
          </div>

          <main class="flex-1 overflow-auto"><div class="md:pt-0 pt-14">${content}</div></main>
        </div>
      `;
    }

    // ──────────────────────────────────────────────────────────────
    // 9. 初始化
    // ──────────────────────────────────────────────────────────────
    function init() {
      DB.bootstrapStorage();
      Store.init();
      Router.init();
      console.log(`班级积分系统已启动 - 数据存储: ${DB.STORAGE_KEY}`);
    }
    init();
  </script>
</body>
</html>
